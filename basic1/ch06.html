<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="http://localhost:8080/servelet_study_war_exploded/api/html/form" method="post" enctype="multipart/form-data">
        <div>
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" autofocus placeholder="사용자 이름을 입력하세요" required>
        </div>
        <div>
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" value="1234" required>
        </div>
        <div>
            <label for ="student1">학생</label>
            <input type="checkbox" id="student1" name="job1" value="학생1">
            <label for ="teacher1">선생님</label>
            <input type="checkbox" id="teacher1" name="job1" value="선생님1" disabled>
            <label for ="developer1">개발자</label>
            <input type="checkbox" id="developer1" name="job1" value="개발자1">
        </div>
        <div>
            <label for ="student2">학생</label>
            <input type="radio" id="student2" name="job2" value="학생2">
            <label for ="teacher2">선생님</label>
            <input type="radio" id="teacher2" name="job2" value="선생님2">
            <label for ="developer2">개발자</label>
            <input type="radio" id="developer2" name="job2" value="개발자2">
        </div>
        <div>
            <label for="profileFile">첨부파일</label>
            <input type="file" id="profileFile" name="profileFile">
        </div>
        <div>
            <select name="" id="">
                <optgroup label="선택1">
                    <option value="">옵션 1</option>
                    <option value="">옵션 2</option>
                    <option value="o">옵션 3</option>
                </optgroup>
                <optgroup label="선택2">
                    <option value="">옵션 4</option>
                    <option value="">옵션 5</option>
                    <option value="">옵션 6</option>
                </optgroup>
            </select>
        </div>
        <div>
            <input type="text" list="nameList">
            <datalist id="nameList">
                <option value="노푸른">노푸른</option>
                <option value="노푸영">노푸영</option>
                <option value="노푸니">노푸니</option>
                <option value="노푸루">노푸루</option>
            </datalist>
        </div>
        <button type="submit">전송</button>
        <button type="button" disabled>확인</button>
        <button type="button">열기</button>
    </form>
</body>
</html>
