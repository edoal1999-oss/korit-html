<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <li>
    <label for="name">이름:</label>
    <input type="text" id="name" placeholder="이름">
    </li>
    <li>
    <label for="email">이메일:</label>
    <input type="email" id="email" placeholder="이메일">
    </li>
    <li>
    <label for="password">비밀번호:</label>
    <input type="password" id="password" placeholder="비밀번호">
    </li>
    <li>
    <label for="birthdate">생년월일:</label>
    <input type="date" id="birthdate" placeholder="생년월일">
    </li>
    <li>
    <label for="male">남</label>
    <input type="radio" name="gender" value="male" id="male">
    <label for="female">여</label>
    <input type="radio" name="gender" value="female" id="female">
    </li>
    <li>
    <label for="java">Java</label>
    <input type="checkbox" name="interests" value="Java" id="java">
    <label for="python">Python</label>
    <input type="checkbox" name="interests" value="Python" id="python">
    <label for="javascript">JavaScript</label>
    <input type="checkbox" name="interests" value="JavaScript" id="javascript">
    </li>
    <li>
    <label for="introduction">자기소개:</label>
    <textarea id="introduction" rows="5" cols="50"></textarea>
    <input type="submit" value="가입하기">
    </li>
</html>
